name: Supabase Keepalive

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping login page to keep DB active
        run: |
          curl -sS --fail --retry 3 --retry-delay 5 --max-time 20 https://entraveltable.vercel.app/login > /dev/null
